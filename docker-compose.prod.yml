services:
  mysql:
    image: mysql:8.0
    container_name: mural_mysql_prod
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      mural_prod_network:
        aliases:
          - mysql

  backend:
    build:
      context: ./backend
    container_name: mural_backend_prod
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_CORS_ALLOWED_ORIGINS: https://${FRONTEND_DOMAIN},http://${FRONTEND_DOMAIN}
    networks:
      mural_prod_network:
      proxy:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.mural-backend.rule=Host(`${BACKEND_DOMAIN}`)"
      - "traefik.http.routers.mural-backend.entrypoints=websecure"
      - "traefik.http.routers.mural-backend.tls=true"
      - "traefik.http.services.mural-backend.loadbalancer.server.port=8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: https://${BACKEND_DOMAIN}/api
    container_name: mural_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.mural-frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.mural-frontend.entrypoints=websecure"
      - "traefik.http.routers.mural-frontend.tls=true"
      - "traefik.http.services.mural-frontend.loadbalancer.server.port=80"

networks:
  mural_prod_network:
  proxy:
    external: true

volumes:
  mysql_prod_data:
